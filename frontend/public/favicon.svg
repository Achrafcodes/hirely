<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="8" fill="#0C0C0C"/>
  <!-- H mark with rising diagonal crossbar — amber -->
  <g transform="translate(4,4)" fill="#E8A030">
    <!-- Left pillar -->
    <rect x="3" y="2" width="4" height="20" rx="1"/>
    <!-- Right pillar -->
    <rect x="17" y="2" width="4" height="20" rx="1"/>
    <!-- Diagonal crossbar (rises left-to-right, suggests momentum) -->
    <polygon points="7,10.5 17,7 17,11 7,14.5"/>
  </g>
</svg>
